<svg width="450" height="210" viewBox="0 0 450 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Most used languages">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0c0a18"></stop>
    <stop offset="1" stop-color="#08060f"></stop>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#c084fc"></stop>
    <stop offset="1" stop-color="#7c3aed"></stop>
  </linearGradient>
  <radialGradient id="halo" cx="0.12" cy="0" r="0.9">
    <stop offset="0" stop-color="#7c3aed" stop-opacity="0.16"></stop>
    <stop offset="1" stop-color="#7c3aed" stop-opacity="0"></stop>
  </radialGradient>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="2.2" result="b"></feGaussianBlur>
    <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
  </filter>
  <clipPath id="barclip"><rect x="24" y="82" width="402" height="10" rx="5"></rect></clipPath>
  
</defs>

<rect x="0.5" y="0.5" width="449" height="209" rx="14" fill="url(#bg)" stroke="#241a3d"></rect>
<rect x="0.5" y="0.5" width="449" height="209" rx="14" fill="url(#halo)"></rect>
<rect x="0" y="0" width="3.5" height="210" rx="2" fill="url(#accent)"></rect>

<text class="fade" x="24" y="30" font-size="10.5" letter-spacing="3" fill="#5b4a82">// LANGUAGES</text>
<text class="fade" x="24" y="54" font-size="17" font-weight="700" fill="#d8b4fe" filter="url(#glow)">Most Used</text>
<line x1="24" y1="66" x2="426" y2="66" stroke="#1e1633"></line>

<rect x="24" y="82" width="402" height="10" rx="5" fill="#16112b"></rect>
<g clip-path="url(#barclip)">
{{ progress_bar }}
</g>

{{ lang_rows }}

<text class="fade" style="animation-delay:.5s" x="24" y="200" font-size="9" letter-spacing=".5" fill="#5b4a82">// {{ repo_count }} REPOS · {{ lang_count }} LANGUAGES</text>
</svg>
<svg width="450" height="224" viewBox="0 0 450 224" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Contribution streak">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0c0a18"></stop>
    <stop offset="1" stop-color="#08060f"></stop>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#c084fc"></stop>
    <stop offset="1" stop-color="#7c3aed"></stop>
  </linearGradient>
  <radialGradient id="halo" cx="0.5" cy="0.45" r="0.55">
    <stop offset="0" stop-color="#7c3aed" stop-opacity="0.18"></stop>
    <stop offset="1" stop-color="#7c3aed" stop-opacity="0"></stop>
  </radialGradient>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="2.6" result="b"></feGaussianBlur>
    <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
  </filter>
  
</defs>

<rect x="0.5" y="0.5" width="449" height="223" rx="14" fill="url(#bg)" stroke="#241a3d"></rect>
<rect x="0.5" y="0.5" width="449" height="223" rx="14" fill="url(#halo)"></rect>
<rect x="0" y="0" width="3.5" height="224" rx="2" fill="url(#accent)"></rect>

<text class="fade" x="24" y="30" font-size="10.5" letter-spacing="3" fill="#5b4a82">// ACTIVITY</text>
<text class="fade" x="24" y="54" font-size="17" font-weight="700" fill="#d8b4fe" filter="url(#glow)">Contribution Streak</text>
<line x1="24" y1="66" x2="426" y2="66" stroke="#1e1633"></line>

<line x1="156" y1="88" x2="156" y2="196" stroke="#1e1633"></line>
<line x1="294" y1="88" x2="294" y2="196" stroke="#1e1633"></line>

<g class="fade" style="animation-delay:.15s">
  <text x="88" y="132" text-anchor="middle" font-size="30" font-weight="700" fill="#e9d5ff">490</text>
  <text x="88" y="154" text-anchor="middle" font-size="8.5" letter-spacing="1" fill="#8b7aa8">TOTAL CONTRIBUTIONS</text>
  <text x="88" y="174" text-anchor="middle" font-size="9" fill="#6b5b8a">Jul 2020 — Present</text>
</g>

<g class="fade" style="animation-delay:.05s">
  <circle cx="225" cy="120" r="40" fill="none" stroke="#1e1633" stroke-width="5"></circle>
  <circle class="ring" cx="225" cy="120" r="40" fill="none" stroke="#c084fc" stroke-width="5" stroke-linecap="round" stroke-dasharray="251.3" stroke-dashoffset="188.5" transform="rotate(-90 225 120)" style="--off: 188.5" filter="url(#glow)"></circle>
  <text x="225" y="116" text-anchor="middle" font-size="26" font-weight="700" fill="#c084fc">2</text>
  <text x="225" y="133" text-anchor="middle" font-size="8" letter-spacing="1.5" fill="#8b7aa8">DAYS</text>
  <text x="225" y="174" text-anchor="middle" font-size="8.5" letter-spacing="1" fill="#d8b4fe">CURRENT STREAK</text>
  <text x="225" y="188" text-anchor="middle" font-size="9" fill="#6b5b8a">Jun 11 — Jun 12</text>
</g>

<g class="fade" style="animation-delay:.25s">
  <text x="362" y="132" text-anchor="middle" font-size="30" font-weight="700" fill="#e9d5ff">8</text>
  <text x="362" y="154" text-anchor="middle" font-size="8.5" letter-spacing="1" fill="#8b7aa8">LONGEST STREAK</text>
  <text x="362" y="174" text-anchor="middle" font-size="9" fill="#6b5b8a">May 7 — May 14, 2026</text>
</g>
</svg>